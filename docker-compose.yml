services:
  screeps:
    build: .
    container_name: screeps-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "21025:21025"
      - "21026:21026"
    volumes:
      - screeps-data:/screeps
      - ./.screepsrc:/screepsrc:ro
    environment:
      - STEAM_KEY=${STEAM_KEY}
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DATABASE=screeps
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/screeps/.screepsdb
      - STORAGE_PORT=21027
    deploy:
      resources:
        limits:
          cpus: '8'           # Max CPUs (adjust based on runners_cnt + processors_cnt)
          memory: 12G         # Max RAM
        reservations:
          cpus: '4'           # Reserve at least this many CPUs
          memory: 4G          # Reserve at least this much RAM

  mongo:
    image: mongo:8
    container_name: screeps-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'           # Max CPUs for MongoDB
          memory: 8G          # Max RAM
        reservations:
          cpus: '1'           # Reserve at least this many CPUs
          memory: 1G          # Reserve at least this much RAM

  redis:
    image: redis:7
    container_name: screeps-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'           # Max CPUs for Redis
          memory: 2G          # Max RAM
        reservations:
          cpus: '1'           # Reserve at least this many CPUs
          memory: 256M        # Reserve at least this much RAM

volumes:
  screeps-data:
  mongo-data:
  redis-data:
