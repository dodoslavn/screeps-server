services:
  screeps:
    build: .
    container_name: screeps-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "21025:21025"
      - "21026:21026"
    volumes:
      - screeps-data:/screeps
      - ./.screepsrc:/screeps/.screepsrc:ro
    environment:
      - STEAM_KEY=${STEAM_KEY}
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DATABASE=screeps
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      resources:
        limits:
          cpus: '30'          # Max 30 CPUs (adjust based on runners_cnt + processors_cnt)
          memory: 32G         # Max 32GB RAM
        reservations:
          cpus: '10'          # Reserve at least 10 CPUs
          memory: 8G          # Reserve at least 8GB RAM

  mongo:
    image: mongo:8
    container_name: screeps-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '8'           # Max 8 CPUs for MongoDB
          memory: 16G         # Max 16GB RAM
        reservations:
          cpus: '2'           # Reserve at least 2 CPUs
          memory: 2G          # Reserve at least 2GB RAM

  redis:
    image: redis:7
    container_name: screeps-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'           # Max 4 CPUs for Redis
          memory: 4G          # Max 4GB RAM
        reservations:
          cpus: '1'           # Reserve at least 1 CPU
          memory: 512M        # Reserve at least 512MB RAM

volumes:
  screeps-data:
  mongo-data:
  redis-data:
