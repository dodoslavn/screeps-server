version: '3.8'

services:
  screeps:
    build: .
    container_name: screeps-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "21025:21025"
      - "21026:21026"
    volumes:
      - screeps-data:/screeps
      - ./.screepsrc:/screeps/.screepsrc:ro
    environment:
      - STEAM_KEY=${STEAM_KEY}
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DATABASE=screeps
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  mongo:
    image: mongo:8
    container_name: screeps-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: screeps-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  screeps-data:
  mongo-data:
  redis-data:
